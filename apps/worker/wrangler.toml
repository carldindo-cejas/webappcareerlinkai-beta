name = "careerlinkai"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

# Local dev binds the Worker to http://localhost:8787
[dev]
port = 8787

# D1 database — run `wrangler d1 create careerlinkai` once, paste the id below.
[[d1_databases]]
binding = "DB"
database_name = "webappcareerlinkai-beta"
database_id = "a9b922e5-0e01-4038-80a7-0f97f05a5c38"

# KV namespace for rate limit counters.
# Create once: `wrangler kv namespace create RATE_LIMITS`.
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "2bc63fefc13b4b70841b9e3c69f93faa"

[durable_objects]
bindings = [{ name = "NOTIFICATIONS", class_name = "NotificationDO" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["NotificationDO"]

[vars]
# For local dev only. In production use `wrangler secret put JWT_SECRET`.
JWT_SECRET = "dev-secret-change-me-to-a-long-random-string"
FRONTEND_ORIGIN = "https://careerlinkai.online"
# Cloudflare AI Gateway slug — create once via `wrangler ai-gateway create careerlinkai-ai`.
AI_GATEWAY_ID = "careerlinkai-beta-ai-gateway"
RESEND_FROM_EMAIL = "noreply@careerlinkai.online"
RESEND_FROM_NAME = "CareerLinkAI"

[ai]
binding = "AI"

# Vectorize index for RAG knowledge base.
# Create once: wrangler vectorize create careerlinkai-knowledge --dimensions=768 --metric=cosine
[[vectorize]]
binding = "KNOWLEDGE"
index_name = "careerlinkai-knowledge"

[triggers]
crons = ["0 2 * * *"]

[assets]
directory = "../frontend/dist"
binding = "ASSETS"
run_worker_first = true
